<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>ViaProfit ISP - Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial, sans-serif; background:#f4f6f8; margin:0; padding:20px; color:#222; }
    .container { max-width:1300px; margin:auto; }
    .card { background:#fff; padding:20px; border-radius:12px; margin-bottom:20px; box-shadow:0 2px 10px rgba(0,0,0,.08); }
    .topo { display:flex; justify-content:space-between; gap:15px; flex-wrap:wrap; align-items:center; }
    input { padding:12px; border:1px solid #ccc; border-radius:8px; min-width:280px; }
    button, .btn { background:#2563eb; color:white; border:0; padding:9px 12px; border-radius:8px; cursor:pointer; font-weight:bold; text-decoration:none; display:inline-block; font-size:13px; }
    .btn-green { background:#15803d; }
    .btn-orange { background:#d97706; }
    .btn-gray { background:#374151; }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:10px; border-bottom:1px solid #ddd; text-align:left; font-size:14px; }
    th { background:#e5e7eb; }
    .status { padding:4px 8px; border-radius:6px; font-size:12px; font-weight:bold; }
    .ativo { background:#dcfce7; color:#166534; }
    .cancelado { background:#fee2e2; color:#991b1b; }
    .suspenso { background:#fef3c7; color:#92400e; }
    .acoes { display:flex; gap:6px; flex-wrap:wrap; }
  </style>
</head>
<body>

<div class="container">
  <div class="topo">
    <div>
      <h1>ViaProfit ISP</h1>
      <p>Dashboard principal de contratos e rentabilidade</p>
    </div>
  </div>

  <div class="card">
    <h2>Buscar contratos</h2>
    <input id="campoBusca" placeholder="Nome, CPF ou número do contrato">
    <button type="button" onclick="buscarContratos()">Buscar</button>
    <button type="button" class="btn-gray" onclick="listarContratos()">Listar recentes</button>
  </div>

  <div class="card">
    <h2>Contratos</h2>
    <table>
      <thead>
        <tr>
          <th>Contrato</th>
          <th>Cliente</th>
          <th>CPF</th>
          <th>Valor</th>
          <th>Desconto</th>
          <th>Final</th>
          <th>Venc.</th>
          <th>Status</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="listaContratos">
        <tr><td colspan="9">Carregando...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script src="./assets/js/dashboard.js?v=1"></script>
</body>
</html>
