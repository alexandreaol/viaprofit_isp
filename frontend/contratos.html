<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>ViaProfit ISP - Contratos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; background:#f4f6f8; margin:0; padding:20px; }
    .container { max-width:1200px; margin:auto; }
    .card { background:#fff; padding:20px; border-radius:12px; margin-bottom:20px; box-shadow:0 2px 10px rgba(0,0,0,.08); }
    input { width:100%; padding:12px; border:1px solid #ccc; border-radius:8px; box-sizing:border-box; }
    button { background:#2563eb; color:#fff; border:0; padding:10px 14px; border-radius:8px; cursor:pointer; font-weight:bold; }
    table { width:100%; border-collapse:collapse; background:#fff; }
    th,td { padding:10px; border-bottom:1px solid #ddd; text-align:left; font-size:14px; }
    th { background:#e5e7eb; }
    .status { padding:4px 8px; border-radius:6px; font-size:12px; font-weight:bold; }
    .ativo { background:#dcfce7; color:#166534; }
    .cancelado { background:#fee2e2; color:#991b1b; }
  </style>
</head>
<body>
<div class="container">
  <h1>ViaProfit ISP</h1>
  <p>Buscar contratos do ViaSistema CCM</p>

  <div class="card">
    <h2>Buscar contrato</h2>
    <input id="campoBusca" placeholder="Digite nome, CPF ou número do contrato">
    <br><br>
    <button onclick="buscarContratos()">Buscar</button>
  </div>

  <div class="card">
    <h2>Resultados</h2>
    <table>
      <thead>
        <tr>
          <th>Contrato</th>
          <th>Cliente</th>
          <th>CPF</th>
          <th>Valor</th>
          <th>Status</th>
          <th>Ação</th>
        </tr>
      </thead>
      <tbody id="listaContratos">
        <tr><td colspan="6">Faça uma busca.</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script src="assets/js/contratos.js"></script>
</body>
</html>
