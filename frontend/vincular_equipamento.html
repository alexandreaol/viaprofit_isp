<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Vincular Equipamento - ViaProfit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial, sans-serif; background:#f4f6f8; margin:0; padding:20px; }
    .container { max-width:1000px; margin:auto; }
    .card { background:#fff; padding:20px; border-radius:12px; margin-bottom:20px; box-shadow:0 2px 10px rgba(0,0,0,.08); }
    .grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:12px; }
    label { font-weight:bold; font-size:13px; }
    input, select, textarea { width:100%; padding:10px; margin-top:4px; border:1px solid #ccc; border-radius:8px; box-sizing:border-box; }
    button { background:#2563eb; color:white; border:0; padding:12px 18px; border-radius:8px; cursor:pointer; font-weight:bold; margin-top:15px; }
    .hidden { display:none; }
  </style>
</head>
<body>

<div class="container">
  <h1>Vincular Equipamento ao Contrato</h1>

  <div class="card">
    <p><strong>Contrato selecionado:</strong> <span id="contratoSelecionado"></span></p>
    <a href="contratos.html">Voltar para contratos</a>
  </div>

  <div class="card">
    <h2>Tipo de vínculo</h2>

    <label>
      <input type="radio" name="modoEquipamento" value="existente" checked>
      Usar equipamento já cadastrado
    </label>

    <br><br>

    <label>
      <input type="radio" name="modoEquipamento" value="novo">
      Cadastrar novo equipamento agora
    </label>
  </div>

  <form id="formVinculo">
    <input type="hidden" name="numero_contrato" id="numeroContrato">

    <div class="card" id="blocoEquipamentoExistente">
      <h2>Equipamento existente</h2>

      <label>Equipamento em estoque</label>
      <select name="equipamento_id" id="equipamento_id"></select>
    </div>

    <div class="card hidden" id="blocoNovoEquipamento">
      <h2>Novo equipamento</h2>

      <div class="grid">
        <div>
          <label>Tipo</label>
          <input type="text" id="novo_tipo" placeholder="Roteador, ONU, etc">
        </div>

        <div>
          <label>Marca</label>
          <input type="text" id="novo_marca" placeholder="ZTE, Huawei, TP-Link">
        </div>

        <div>
          <label>Modelo</label>
          <input type="text" id="novo_modelo">
        </div>

        <div>
          <label>Serial</label>
          <input type="text" id="novo_serial">
        </div>

        <div>
          <label>MAC</label>
          <input type="text" id="novo_mac">
        </div>

        <div>
          <label>Patrimônio</label>
          <input type="text" id="novo_patrimonio">
        </div>

        <div>
          <label>Valor de compra</label>
          <input type="number" step="0.01" id="novo_valor_compra" value="0">
        </div>

        <div>
          <label>Data da compra</label>
          <input type="date" id="novo_data_compra">
        </div>
      </div>

      <br>

      <label>Observação do equipamento</label>
      <textarea id="novo_observacao" rows="3"></textarea>
    </div>

    <div class="card">
      <h2>Dados da instalação</h2>

      <div class="grid">
        <div>
          <label>Data da instalação</label>
          <input type="date" name="data_instalacao" required>
        </div>

        <div>
          <label>Valor do equipamento no cálculo</label>
          <input type="number" step="0.01" name="valor_usado_no_calculo" id="valor_usado_no_calculo" value="0">
        </div>

        <div>
          <label>Custo da instalação</label>
          <input type="number" step="0.01" name="custo_instalacao" value="0">
        </div>
      </div>

      <br>

      <label>Observação do vínculo</label>
      <textarea name="observacao" rows="3"></textarea>

      <button type="submit">Salvar e Vincular</button>
    </div>
  </form>
</div>

<script src="assets/js/vincular_equipamento.js"></script>
</body>
</html>
