<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Custos do Contrato - ViaProfit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial, sans-serif; background:#f4f6f8; margin:0; padding:20px; color:#222; }
    .container { max-width:1200px; margin:auto; }
    .card { background:#fff; padding:20px; border-radius:12px; margin-bottom:20px; box-shadow:0 2px 10px rgba(0,0,0,.08); }
    .grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:12px; }
    label { font-size:13px; font-weight:bold; }
    input, select, textarea { width:100%; padding:10px; margin-top:4px; border:1px solid #ccc; border-radius:8px; box-sizing:border-box; }
    button, .btn { background:#2563eb; color:white; border:0; padding:10px 14px; border-radius:8px; cursor:pointer; font-weight:bold; text-decoration:none; display:inline-block; }
    .btn-green { background:#15803d; }
    .btn-gray { background:#374151; }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:10px; border-bottom:1px solid #ddd; text-align:left; font-size:14px; }
    th { background:#e5e7eb; }
  </style>
</head>
<body>

<div class="container">
  <h1>Custos do Contrato</h1>

  <div class="card">
    <p><strong>Contrato:</strong> <span id="contratoSelecionado"></span></p>
    <a class="btn btn-gray" href="dashboard.html">Voltar ao dashboard</a>
    <a class="btn btn-green" id="linkRentabilidade" href="#">Ver rentabilidade</a>
  </div>

  <div class="card">
    <h2>Cadastrar custo único</h2>
    <form id="formCustoUnico">
      <input type="hidden" name="numero_contrato" id="numeroContratoUnico">

      <div class="grid">
        <div>
          <label>Data do custo</label>
          <input type="date" name="data_custo" required>
        </div>

        <div>
          <label>Tipo</label>
          <select name="tipo" required>
            <option value="instalacao">Instalação</option>
            <option value="equipamento">Equipamento</option>
            <option value="manutencao">Manutenção</option>
            <option value="material">Material</option>
            <option value="deslocamento">Deslocamento</option>
            <option value="outro">Outro</option>
          </select>
        </div>

        <div>
          <label>Valor</label>
          <input type="number" step="0.01" name="valor" required>
        </div>
      </div>

      <br>

      <label>Descrição</label>
      <textarea name="descricao" rows="2"></textarea>

      <button type="submit">Salvar custo único</button>
    </form>
  </div>

  <div class="card">
    <h2>Cadastrar custo mensal do contrato</h2>
    <form id="formCustoMensal">
      <input type="hidden" name="numero_contrato" id="numeroContratoMensal">

      <div class="grid">
        <div>
          <label>Tipo</label>
          <select name="tipo" required>
            <option value="rede_neutra">Rede neutra extra</option>
            <option value="sistema">Sistema</option>
            <option value="boleto">Boleto</option>
            <option value="pix">Pix</option>
            <option value="suporte">Suporte</option>
            <option value="repasse">Repasse</option>
            <option value="outro">Outro</option>
          </select>
        </div>

        <div>
          <label>Valor mensal</label>
          <input type="number" step="0.01" name="valor" required>
        </div>

        <div>
          <label>Ativo</label>
          <select name="ativo">
            <option value="1">Sim</option>
            <option value="0">Não</option>
          </select>
        </div>
      </div>

      <br>

      <label>Descrição</label>
      <textarea name="descricao" rows="2"></textarea>

      <button type="submit">Salvar custo mensal</button>
    </form>
  </div>

  <div class="card">
    <h2>Custos únicos cadastrados</h2>
    <table>
      <thead>
        <tr>
          <th>Data</th>
          <th>Tipo</th>
          <th>Descrição</th>
          <th>Valor</th>
          <th>Origem</th>
        </tr>
      </thead>
      <tbody id="listaCustosUnicos">
        <tr><td colspan="5">Carregando...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="card">
    <h2>Custos mensais cadastrados</h2>
    <table>
      <thead>
        <tr>
          <th>Tipo</th>
          <th>Descrição</th>
          <th>Valor</th>
          <th>Ativo</th>
        </tr>
      </thead>
      <tbody id="listaCustosMensais">
        <tr><td colspan="4">Carregando...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script src="./assets/js/custos.js?v=1"></script>
</body>
</html>
